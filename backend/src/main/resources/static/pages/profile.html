<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil - Food-Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .profile-container { max-width: 600px; margin: 100px auto; padding: 2rem; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .profile-header { text-align: center; margin-bottom: 2rem; }
        .profile-pic-edit { position: relative; width: 120px; height: 120px; margin: 0 auto 1rem; }
        .profile-pic-edit img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); }
        .edit-badge { position: absolute; bottom: 0; right: 0; background: var(--primary); color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 3px solid white; }
    </style>
</head>
<body style="background-color: #f7f9fc;">
    <nav class="navbar">
        <div class="logo" onclick="window.location.href='../index.html'" style="cursor:pointer">
            <i class="fa-solid fa-utensils"></i> Food-Command
        </div>
        <a href="../index.html" class="btn btn-outline"><i class="fa-solid fa-arrow-left"></i> Retour</a>
    </nav>

    <div class="profile-container">
        <div class="profile-header">
            <div class="profile-pic-edit">
                <img id="profile-preview" src="https://ui-avatars.com/api/?name=User&background=FF5A5F&color=fff" alt="Profile">
                <label for="pic-upload" class="edit-badge">
                    <i class="fa-solid fa-camera"></i>
                </label>
                <input type="file" id="pic-upload" style="display:none" accept="image/*">
            </div>
            <h2 id="display-name">Chargement...</h2>
            <p id="display-email" style="color: var(--text-muted);"></p>
        </div>

        <form id="profile-form">
            <div class="form-group">
                <label class="form-label">Nom Complet</label>
                <input type="text" id="input-fullname" class="form-control" placeholder="Votre nom">
            </div>
            <div class="form-group">
                <label class="form-label">Numéro de Téléphone</label>
                <input type="text" id="input-phone" class="form-control" placeholder="Votre téléphone">
            </div>
            <button type="submit" class="btn btn-primary btn-block">Enregistrer les modifications</button>
        </form>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = await api.getCurrentUser();
            if (!user) {
                window.location.href = 'auth.html';
                return;
            }

            document.getElementById('display-name').textContent = user.fullName;
            document.getElementById('display-email').textContent = user.email;
            document.getElementById('input-fullname').value = user.fullName || '';
            document.getElementById('input-phone').value = user.phone || '';
            document.getElementById('profile-preview').src = `https://ui-avatars.com/api/?name=${encodeURIComponent(user.fullName)}&background=FF5A5F&color=fff`;

            document.getElementById('profile-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const updatedData = {
                    fullName: document.getElementById('input-fullname').value,
                    phone: document.getElementById('input-phone').value
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/me`, {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${localStorage.getItem('user_token')}`
                        },
                        body: JSON.stringify(updatedData)
                    });

                    if (response.ok) {
                        alert('Profil mis à jour avec succès !');
                        window.location.reload();
                    }
                } catch (error) {
                    alert('Erreur lors de la mise à jour');
                }
            });
        });
    </script>
</body>
</html>
