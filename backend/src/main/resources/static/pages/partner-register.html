<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devenir Partenaire | Food-Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .register-container {
            max-width: 900px;
            margin: 120px auto 4rem;
            padding: 0 5%;
        }
        .register-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 3rem;
            box-shadow: var(--shadow-md);
        }
        .register-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        .register-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .upload-box {
            border: 2px dashed #CBD5E0;
            padding: 2rem;
            text-align: center;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
        }
        .upload-box:hover {
            border-color: var(--primary);
            background: rgba(255, 90, 95, 0.05);
        }
        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled">
        <a href="../index.html" class="logo">
            <i class="fa-solid fa-utensils"></i> Food-Command
        </a>
    </nav>

    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>Développez votre activité</h1>
                <p class="text-muted">Inscrivez votre restaurant sur Food-Command et touchez des milliers de clients à Abidjan.</p>
            </div>

            <form id="partner-form" onsubmit="handleSubmit(event)">
                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Nom du restaurant</label>
                        <input type="text" class="form-control" id="rest-name" placeholder="Ex: Maquis de la Joie" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Type de cuisine</label>
                        <select class="form-control" required>
                            <option value="">Sélectionnez...</option>
                            <option>Africain</option>
                            <option>Fast Food</option>
                            <option>Pizza</option>
                            <option>Healthy</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Adresse du restaurant</label>
                    <input type="text" class="form-control" placeholder="Ex: Cocody Angré, Rue des banques" required>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label class="form-label">Nom du responsable</label>
                        <input type="text" class="form-control" placeholder="Nom complet" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Numéro de téléphone</label>
                        <input type="tel" class="form-control" placeholder="+225 0000000000" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email professionnel</label>
                    <input type="email" class="form-control" placeholder="contact@restaurant.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Documents officiels (Registre de commerce, etc.)</label>
                    <div class="upload-box">
                        <i class="fa-solid fa-cloud-arrow-up" style="font-size: 2rem; color: var(--text-muted); margin-bottom: 1rem;"></i>
                        <p>Cliquez ou glissez vos fichiers ici</p>
                        <small class="text-muted">PDF, JPG, PNG (Max 10MB)</small>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-block mt-2" style="padding: 1rem; font-size: 1.1rem;">
                    Soumettre ma demande
                </button>
            </form>
        </div>
    </div>

    <script>
        function handleSubmit(e) {
            e.preventDefault();
            const restName = document.getElementById('rest-name').value;
            const userData = {
                name: restName,
                role: 'restaurant',
                email: 'admin@' + restName.toLowerCase().replace(/\s/g, '') + '.com'
            };
            localStorage.setItem('currentUser', JSON.stringify(userData));
            alert('Votre demande a été envoyée avec succès ! Vous pouvez maintenant accéder à votre tableau de bord.');
            window.location.href = 'admin.html';
        }
    </script>
</body>
</html>
