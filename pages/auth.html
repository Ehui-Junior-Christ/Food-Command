<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Food-Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
        }
        .auth-left {
            flex: 1;
            background: linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1504674900247-0877df9cc836?q=80&w=1200&auto=format&fit=crop') center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 3rem;
        }
        .auth-right {
            width: 500px;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            position: relative;
        }
        .auth-box {
            width: 100%;
            max-width: 400px;
        }
        .auth-header {
            margin-bottom: 2rem;
            text-align: center;
        }
        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .form-control {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #CBD5E0;
            border-radius: var(--radius-sm);
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 90, 95, 0.1);
        }
        .role-selector {
            display: flex;
            background: #F1F5F9;
            padding: 0.3rem;
            border-radius: var(--radius-md);
            margin-bottom: 2rem;
        }
        .role-btn {
            flex: 1;
            padding: 0.6rem;
            border-radius: var(--radius-sm);
            cursor: pointer;
            text-align: center;
            font-weight: 600;
            font-size: 0.9rem;
            transition: var(--transition);
        }
        .role-btn.active {
            background: white;
            box-shadow: var(--shadow-sm);
            color: var(--primary);
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid #E2E8F0;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 1rem;
            cursor: pointer;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: var(--transition);
        }
        .auth-tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }
        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .social-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            border: 1px solid #CBD5E0;
            border-radius: var(--radius-sm);
            background: white;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }
        .social-btn:hover {
            background: #F8FAFC;
            border-color: var(--text-main);
        }
        @media (max-width: 768px) {
            .auth-left { display: none; }
            .auth-right { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div style="text-align:center;">
                <h1 style="font-size:3.5rem; font-family:'Outfit';">Food-Command</h1>
                <p style="font-size:1.2rem; max-width:400px; margin:0 auto;">Rejoignez la meilleure plateforme de livraison de repas à Abidjan. Rapide, frais et délicieux.</p>
            </div>
        </div>
        <div class="auth-right">
            <a href="../index.html" style="position:absolute; top:2rem; left:2rem; color:var(--text-muted);">
                <i class="fa-solid fa-arrow-left"></i> Retour
            </a>
            
            <div class="auth-box">
                <div class="role-selector">
                    <div class="role-btn active" onclick="setRole('client', this)">Je suis un Client</div>
                    <div class="role-btn" onclick="setRole('restaurant', this)">Je suis un Restaurant</div>
                </div>

                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="switchTab(this)">Connexion</div>
                    <div class="auth-tab" onclick="switchTab(this)">Inscription</div>
                </div>

                <div class="auth-header">
                    <h2>Bienvenue !</h2>
                    <p class="text-muted" id="auth-subtext">Connectez-vous pour continuer</p>
                </div>

                <form id="auth-form">
                    <div id="name-field" class="form-group" style="display:none;">
                        <label class="form-label">Nom complet</label>
                        <input type="text" class="form-control" id="reg-name" placeholder="Jean Dupont">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="auth-email" placeholder="votre@email.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" style="display:flex; justify-content:space-between;">
                            Mot de passe
                            <a href="#" style="color:var(--primary); font-size:0.85rem;" id="forgot-link" onclick="forgotPassword(event)">Oublié ?</a>
                        </label>
                        <input type="password" class="form-control" id="auth-pass" placeholder="••••••••" required>
                    </div>
                    
                    <button type="button" class="btn btn-primary btn-block mt-2" onclick="handleAuth()" id="submit-btn">
                        Se Connecter
                    </button>
                </form>

                <div style="text-align:center; margin: 2rem 0; color:var(--text-muted); position:relative;">
                    <hr style="border:none; border-top:1px solid #E2E8F0; position:absolute; width:100%; top:50%; z-index:1;">
                    <span style="background:white; padding:0 1rem; position:relative; z-index:2;">ou continuer avec</span>
                </div>

                <div class="social-login">
                    <button class="social-btn">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20" alt="Google"> Google
                    </button>
                    <button class="social-btn">
                        <i class="fa-brands fa-facebook" style="color:#1877F2; font-size:1.2rem;"></i> Facebook
                    </button>
                </div>
                
                <div style="text-align:center; margin-top:2rem;">
                    <a href="partner-register.html" style="color:var(--secondary); font-weight:500;"><i class="fa-solid fa-store"></i> Je suis un restaurateur / Devenir Partenaire</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentRole = 'client';
        let currentMode = 'login';

        function setRole(role, el) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            updateUI();
        }

        function switchTab(tab) {
            currentMode = tab.innerText === 'Connexion' ? 'login' : 'register';
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            if (currentMode === 'register') {
                currentRole = 'client';
                document.querySelectorAll('.role-btn').forEach(b => {
                    b.classList.remove('active');
                    if (b.innerText.includes('Client')) b.classList.add('active');
                });
            }
            updateUI();
        }

        function updateUI() {
            const isLogin = currentMode === 'login';
            const isRest = currentRole === 'restaurant';

            document.querySelector('.role-selector').style.display = isLogin ? 'flex' : 'none';
            document.querySelector('.auth-header h2').innerText = isLogin ? 'Bienvenue !' : 'Créer un compte';
            document.getElementById('auth-subtext').innerText = isLogin ? 'Connectez-vous pour continuer' : 'Rejoignez-nous aujourd\'hui';
            
            document.getElementById('name-field').style.display = !isLogin ? 'block' : 'none';
            document.getElementById('forgot-link').style.display = isLogin ? 'block' : 'none';
            document.getElementById('submit-btn').innerText = isLogin ? 'Se Connecter' : 'S\'inscrire';
        }

        function handleAuth() {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;

            if(!email || !pass) return alert('Veuillez remplir tous les champs');

            if(currentMode === 'register') {
                const userData = {
                    email,
                    pass,
                    role: 'client',
                    name: document.getElementById('reg-name').value
                };
                localStorage.setItem('user_' + email, JSON.stringify(userData));
                localStorage.setItem('currentUser', JSON.stringify(userData));
                alert('Inscription réussie !');
                window.location.href = currentRole === 'client' ? 'profile.html' : 'admin.html';
            } else {
                const stored = localStorage.getItem('user_' + email);
                if(stored) {
                    const user = JSON.parse(stored);
                    if(user.pass === pass) {
                        localStorage.setItem('currentUser', JSON.stringify(user));
                        window.location.href = user.role === 'client' ? 'profile.html' : 'admin.html';
                    } else {
                        alert('Mot de passe incorrect');
                    }
                } else {
                    // Fallback for demo: if not found, just login as guest
                    const guest = { email, role: currentRole, name: 'Utilisateur Démo' };
                    localStorage.setItem('currentUser', JSON.stringify(guest));
                    window.location.href = currentRole === 'client' ? 'profile.html' : 'admin.html';
                }
            }
        }

        function forgotPassword(e) {
            e.preventDefault();
            const email = document.getElementById('auth-email').value;
            if(!email) {
                alert('Veuillez entrer votre adresse email pour réinitialiser le mot de passe.');
            } else {
                alert('Un lien de réinitialisation a été envoyé à ' + email);
            }
        }
    </script>
</body>
</html>
