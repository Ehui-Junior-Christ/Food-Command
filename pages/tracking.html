<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi en temps réel | Food-Command</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        :root {
            --primary: #FF5A5F;
            --secondary: #1E293B;
            --accent: #22C55E;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html { height: 100%; margin: 0; font-family: 'Inter', sans-serif; background: #f8fafc; }

        #map { 
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            z-index: 1;
        }

        .header-floating {
            position: absolute;
            top: 25px;
            left: 25px;
            z-index: 1000;
        }

        .btn-round {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            color: var(--secondary);
            text-decoration: none;
            border: 1px solid rgba(0,0,0,0.05);
            transition: 0.3s;
        }

        .tracking-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            max-width: 550px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-radius: 35px;
            padding: 2rem;
            z-index: 1000;
            box-shadow: 0 25px 50px rgba(0,0,0,0.1);
            border: 1px solid white;
        }

        .order-info { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; }
        .order-info h2 { font-family: 'Outfit'; font-size: 1.4rem; margin: 0; color: var(--secondary); }
        .status-badge { background: #f0fdf4; color: #16a34a; padding: 6px 14px; border-radius: 50px; font-size: 0.7rem; font-weight: 800; }

        /* STEPPER */
        .stepper { position: relative; display: flex; justify-content: space-between; margin: 2rem 0; padding: 0 10px; }
        .stepper-line { position: absolute; top: 20px; left: 40px; right: 40px; height: 4px; background: #E2E8F0; z-index: 0; }
        .stepper-line-fill { height: 100%; background: var(--primary); width: 0%; transition: 1s; box-shadow: 0 0 10px var(--primary); }
        .step { display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 1; width: 60px; }
        .step-circle { width: 40px; height: 40px; background: white; border: 3px solid #E2E8F0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #94A3B8; transition: 0.4s; }
        .step.active .step-circle { border-color: var(--primary); color: var(--primary); transform: scale(1.1); }
        .step.completed .step-circle { background: var(--primary); border-color: var(--primary); color: white; }
        .step-label { font-size: 0.65rem; font-weight: 700; color: #64748B; text-align: center; }

        .courier-card { display: none; background: #F8FAFC; padding: 1rem; border-radius: 20px; align-items: center; gap: 1rem; border: 1px solid #E2E8F0; margin-top: 1rem; }
        .courier-avatar { width: 50px; height: 50px; border-radius: 15px; object-fit: cover; }
        .btn-call { margin-left: auto; width: 40px; height: 40px; border-radius: 12px; background: white; border: 1px solid #E2E8F0; display: flex; align-items: center; justify-content: center; color: var(--accent); }
    </style>
</head>
<body>
    <div id="map"></div>

    <div class="header-floating">
        <a href="profile.html" class="btn-round"><i class="fa-solid fa-arrow-left"></i></a>
    </div>

    <div class="tracking-panel">
        <div class="order-info">
            <div>
                <h2 id="order-title">Commande #...</h2>
                <p id="time-estimate" style="margin:5px 0 0; font-size:0.8rem; color:#64748B;">Arrivée estimée : 15-20 min</p>
            </div>
            <div class="status-badge" id="order-status">EN COURS</div>
        </div>

        <div class="stepper">
            <div class="stepper-line"><div class="stepper-line-fill" id="progress-fill"></div></div>
            <div class="step" id="step-PENDING"><div class="step-circle"><i class="fa-solid fa-receipt"></i></div><span class="step-label">Reçue</span></div>
            <div class="step" id="step-PREPARING"><div class="step-circle"><i class="fa-solid fa-utensils"></i></div><span class="step-label">Cuisine</span></div>
            <div class="step" id="step-OUT_FOR_DELIVERY"><div class="step-circle"><i class="fa-solid fa-motorcycle"></i></div><span class="step-label">Route</span></div>
            <div class="step" id="step-DELIVERED"><div class="step-circle"><i class="fa-solid fa-house-flag"></i></div><span class="step-label">Arrivée</span></div>
        </div>

        <div class="courier-card" id="courier-card">
            <img id="courier-img" src="" class="courier-avatar">
            <div style="flex: 1;">
                <h4 id="courier-name" style="margin: 0; font-size: 1rem;">Livreur</h4>
                <p id="courier-meta" style="margin: 0; font-size: 0.75rem; color: #64748B;">Matricule: ...</p>
            </div>
            <a href="#" id="courier-phone" class="btn-call"><i class="fa-solid fa-phone"></i></a>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="../js/api.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('id');
        let map, courierMarker, clientMarker;

        if (!orderId) window.location.href = '../index.html';

        async function init() {
            try {
                const order = await api.getOrder(orderId);
                initMap(order);
                updateUI(order);
                connectWebSocket();
            } catch (e) { console.error(e); }
        }

        function initMap(order) {
            const destLat = order.destinationLat || 5.3484;
            const destLng = order.destinationLng || -3.9783;

            map = L.map('map', { zoomControl: false }).setView([destLat, destLng], 15);
            
            // Serveur de tuiles Google Maps
            L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}', {
                maxZoom: 20,
                subdomains:['mt0','mt1','mt2','mt3'],
                attribution: '© Google Maps'
            }).addTo(map);

            const clientIcon = L.divIcon({
                className: 'custom-icon',
                html: '<div style="background: #1e293b; color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.2);"><i class="fa-solid fa-house-user"></i></div>',
                iconSize: [30, 30], iconAnchor: [15, 15]
            });
            clientMarker = L.marker([destLat, destLng], { icon: clientIcon }).addTo(map);

            if (order.courierLat && order.courierLng) updateCourierMarker(order.courierLat, order.courierLng);
        }

        function updateCourierMarker(lat, lng) {
            const courierIcon = L.divIcon({
                className: 'pulse-icon',
                html: '<div style="background: var(--primary); width: 20px; height: 20px; border: 3px solid white; border-radius: 50%; box-shadow: 0 0 15px var(--primary); animation: pulse 1.5s infinite;"></div>',
                iconSize: [20, 20], iconAnchor: [10, 10]
            });

            if (!courierMarker) courierMarker = L.marker([lat, lng], { icon: courierIcon }).addTo(map);
            else courierMarker.setLatLng([lat, lng]);

            const bounds = L.latLngBounds([clientMarker.getLatLng(), courierMarker.getLatLng()]);
            map.fitBounds(bounds, { padding: [100, 100] });
        }

        function connectWebSocket() {
            const socket = new SockJS('http://localhost:8080/ws-tracking');
            const stomp = Stomp.over(socket);
            stomp.debug = null;
            stomp.connect({}, () => {
                stomp.subscribe('/topic/order/' + orderId, (msg) => {
                    const update = JSON.parse(msg.body);
                    updateUI(update);
                    if (update.courierLat && update.courierLng) updateCourierMarker(update.courierLat, update.courierLng);
                });
            });
        }

        function updateUI(order) {
            document.getElementById('order-title').innerText = `Commande #${order.id}`;
            const steps = ['PENDING', 'PREPARING', 'OUT_FOR_DELIVERY', 'DELIVERED'];
            const idx = steps.indexOf(order.status);
            document.getElementById('progress-fill').style.width = `${idx === 0 ? 0 : (idx / 3) * 100}%`;

            steps.forEach((s, i) => {
                const el = document.getElementById(`step-${s}`);
                if (el) { el.classList.remove('active', 'completed'); if (i < idx) el.classList.add('completed'); else if (i === idx) el.classList.add('active'); }
            });

            if (order.courier) {
                document.getElementById('courier-card').style.display = 'flex';
                document.getElementById('courier-img').src = api.getProfileImageUrl(order.courier);
                document.getElementById('courier-name').innerText = order.courier.fullName;
                document.getElementById('courier-phone').href = `tel:${order.courier.phone || ''}`;
            }
        }
        init();
    </script>
    <style>
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 90, 95, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 90, 95, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 90, 95, 0); } }
    </style>
</body>
</html>
