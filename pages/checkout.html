<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passage de Commande | Food-Command</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        .checkout-container {
            max-width: 1200px;
            margin: 100px auto 4rem;
            padding: 0 5%;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: 3rem;
        }
        .checkout-section {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            margin-bottom: 2rem;
        }
        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-bottom: 1px solid #E2E8F0;
            padding-bottom: 1rem;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .payment-option {
            border: 1px solid #CBD5E0;
            border-radius: var(--radius-md);
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            cursor: pointer;
            transition: var(--transition);
        }
        .payment-option:hover, .payment-option.selected {
            border-color: var(--primary);
            background: rgba(255, 90, 95, 0.05);
        }
        .payment-icon {
            font-size: 1.5rem;
            color: var(--primary);
        }
        .stripe-card-element {
            margin-top: 1rem;
            padding: 1rem;
            background: #f8fafc;
            border-radius: var(--radius-sm);
            border: 1px dashed #CBD5E0;
            display: none;
        }
        .payment-option.selected + .stripe-card-element {
            display: block;
        }
        /* Order Summary */
        .order-summary {
            background: white;
            border-radius: var(--radius-lg);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            position: sticky;
            top: 100px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #E2E8F0;
        }
        .summary-item-info h4 {
            margin-bottom: 0.25rem;
        }
        .summary-totals {
            margin-top: 1.5rem;
        }
        .total-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
        }
        .total-row.grand-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px dashed #CBD5E0;
        }
        @media (max-width: 992px) {
            .checkout-container { grid-template-columns: 1fr; }
            .order-summary { position: static; }
        }
    </style>
</head>
<body>
    <nav class="navbar scrolled" style="display:flex; justify-content:space-between;">
        <a href="../index.html" class="logo">
            <i class="fa-solid fa-utensils"></i> Food-Command
        </a>
        <a href="restaurant.html" style="color:var(--text-muted); font-weight:500;"><i class="fa-solid fa-arrow-left"></i> Retour au menu</a>
    </nav>

    <div class="checkout-container">
        <div class="checkout-left">
            <div class="checkout-section">
                <h2 class="section-title"><i class="fa-solid fa-location-dot"></i> Adresse de Livraison</h2>
                <div class="form-group">
                    <label class="form-label">Adresse Complète</label>
                    <input type="text" class="form-control" placeholder="Ex: Cocody Angré, 8ème Tranche..." value="Cocody Angré, 8ème Tranche">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label class="form-label">Numéro de Téléphone</label>
                        <input type="tel" class="form-control" placeholder="+225 0102030405" value="+225 0102030405">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Instructions de livraison (Optionnel)</label>
                        <input type="text" class="form-control" placeholder="Code portail, étage...">
                    </div>
                </div>
            </div>

            <div class="checkout-section">
                <h2 class="section-title"><i class="fa-solid fa-credit-card"></i> Mode de Paiement</h2>
                <div class="payment-methods">
                    <div>
                        <label class="payment-option selected">
                            <input type="radio" name="payment" checked style="margin-right:1rem;">
                            <i class="fa-brands fa-stripe payment-icon"></i>
                            <div>
                                <h4 style="margin:0;">Carte Bancaire (Stripe)</h4>
                                <small style="color:var(--text-muted)">Paiement sécurisé en ligne</small>
                            </div>
                        </label>
                        <div class="stripe-card-element">
                            <div style="display:flex; gap:1rem; margin-bottom:1rem;">
                                <input type="text" class="form-control" placeholder="Numéro de carte" style="flex:2">
                                <input type="text" class="form-control" placeholder="MM/AA" style="flex:1">
                                <input type="text" class="form-control" placeholder="CVC" style="flex:1">
                            </div>
                            <small class="text-muted"><i class="fa-solid fa-lock"></i> Connexion chiffrée SSL</small>
                        </div>
                    </div>

                    <label class="payment-option">
                        <input type="radio" name="payment" style="margin-right:1rem;">
                        <i class="fa-solid fa-money-bill-wave payment-icon"></i>
                        <div>
                            <h4 style="margin:0;">Paiement à la livraison</h4>
                            <small style="color:var(--text-muted)">Espèces ou Mobile Money à la réception</small>
                        </div>
                    </label>
                </div>
            </div>
        </div>

        <div class="checkout-right">
            <div class="order-summary">
                <h2 class="section-title">Résumé de la Commande</h2>
                <div style="margin-bottom: 1rem; color:var(--text-muted);">
                    <i class="fa-solid fa-store"></i> Burger Palace
                </div>
                <div id="checkout-items"></div>
                
                <div class="summary-totals">
                    <div class="total-row">
                        <span>Sous-total</span>
                        <span id="checkout-subtotal">0 FCFA</span>
                    </div>
                    <div class="total-row">
                        <span>Frais de livraison</span>
                        <span>1 000 FCFA</span>
                    </div>
                    <div class="total-row grand-total">
                        <span>Total à Payer</span>
                        <span class="text-primary" id="checkout-total">0 FCFA</span>
                    </div>
                </div>

                <button class="btn btn-primary btn-block mt-2" style="padding: 1rem; font-size:1.1rem;" onclick="window.location.href='tracking.html'">
                    Confirmer et Payer
                </button>
            </div>
        </div>
    </div>
    
    <script src="../js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const checkoutItemsContainer = document.getElementById('checkout-items');
            const subTotalEl = document.getElementById('checkout-subtotal');
            const totalEl = document.getElementById('checkout-total');
            
            let subtotal = 0;
            
            if(cart.length === 0) {
                checkoutItemsContainer.innerHTML = '<p class="text-muted">Votre panier est vide.</p>';
            } else {
                checkoutItemsContainer.innerHTML = cart.map(item => {
                    subtotal += item.price * item.quantity;
                    return `
                        <div class="summary-item">
                            <div class="summary-item-info">
                                <h4>${item.quantity}x ${item.name}</h4>
                            </div>
                            <div class="summary-item-price font-weight-bold">${(item.price * item.quantity).toLocaleString()} FCFA</div>
                        </div>
                    `;
                }).join('');
            }
            
            subTotalEl.textContent = `${subtotal.toLocaleString()} FCFA`;
            totalEl.textContent = `${subtotal > 0 ? (subtotal + 1000).toLocaleString() : 0} FCFA`;
        });
    </script>
</body>
</html>
